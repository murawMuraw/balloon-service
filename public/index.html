    <script>

        let balloonId = null;
        
        const ZONES = { BRIGHT: 5000, MEDIUM: 10000, HAZE: 15000 };

        // ========== ФУНКЦИИ АВТОРИЗАЦИИ ==========
        
        function showAuthModal(show = true) {
            document.getElementById('authModal').classList.toggle('hidden', !show);
        }
        
        function updateProfileUI() {
            const profileStatus = document.getElementById('profileStatus');
            const profileBtn = document.getElementById('profileButton');
            
            if (currentUser) {
                profileStatus.textContent = currentUser.email;
                profileBtn.style.background = 'rgba(255,255,255,0.95)';
                profileBtn.style.borderColor = '#4caf50';
            } else if (isGuest) {
                profileStatus.textContent = 'Гость';
                profileBtn.style.background = 'rgba(255,255,255,0.95)';
                profileBtn.style.borderColor = '#ff9800';
            }
        }
        
        async function login(email, password) {
            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    currentUser = data.user;
                    isGuest = false;
                    localStorage.setItem('token', token);
                    showAuthModal(false);
                    updateProfileUI();
                    await restoreBalloon();
                    return true;
                } else {
                    document.getElementById('loginError').textContent = data.error || 'Ошибка входа';
                    return false;
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'Ошибка соединения';
                return false;
            }
        }
        
        async function register(email, password) {
            if (password.length < 6) {
                document.getElementById('regError').textContent = 'Пароль должен быть не менее 6 символов';
                return false;
            }
            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    currentUser = data.user;
                    isGuest = false;
                    localStorage.setItem('token', token);
                    showAuthModal(false);
                    updateProfileUI();
                    return true;
                } else {
                    document.getElementById('regError').textContent = data.error || 'Ошибка регистрации';
                    return false;
                }
            } catch (error) {
                document.getElementById('regError').textContent = 'Ошибка соединения';
                return false;
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            token = null;
            currentUser = null;
            isGuest = true;
            updateProfileUI();
            resetFlight();
            showAuthModal(false);
        }
        
        function continueAsGuest() {
            isGuest = true;
            currentUser = null;
            token = null;
            showAuthModal(false);
            updateProfileUI();
        }
        
        // ========== API ЗАПРОСЫ ==========
        
        async function apiRequest(url, options = {}) {
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(`${API_URL}${url}`, { ...options, headers });
            return response;
        }
        
        // ========== ФУНКЦИИ ШАРА ==========
        
        function getUserId() {
            if (currentUser) return currentUser.id;
            return localStorage.getItem('guest_user_id') || (() => {
                const id = 'guest_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('guest_user_id', id);
                return id;
            })();
        }
        
        async function getWindData(lat, lng) {
            try {
                const response = await fetch(`${API_URL}/api/wind?lat=${lat}&lon=${lng}`);
                const data = await response.json();
                if (data.speed) return data;
                return null;
            } catch (error) {
                console.error('Ошибка ветра:', error);
                return null;
            }
        }
        
        function updateWindDisplay(wind) {
            const windInfo = document.getElementById('windInfo');
            if (wind) {
                const directions = ['С', 'СВ', 'В', 'ЮВ', 'Ю', 'ЮЗ', 'З', 'СЗ'];
                const index = Math.round(wind.direction / 45) % 8;
                windInfo.innerHTML = `
                    <div>🌬️ Ветер: ${wind.speed.toFixed(1)} м/с</div>
                    <div>🧭 Направление: ${wind.direction}° (${directions[index]})</div>
                    ${wind.gust ? `<div>💨 Порывы: ${wind.gust.toFixed(1)} м/с</div>` : ''}
                    <div>⏱️ Обновлено: ${new Date().toLocaleTimeString()}</div>
                `;
            } else {
                windInfo.innerHTML = `<div>🌬️ Ветер: --</div><div>🧭 Направление: --</div><div>📏 Скорость: -- м/с</div>`;
            }
        }
        
        function calculateNextPoint(start, wind, seconds) {
            const windDirection = (wind.direction + 180) % 360;
            const distance = wind.speed * seconds;
            const distanceKm = distance / 1000;
            const R = 6371;
            const lat1 = start.lat * Math.PI / 180;
            const lon1 = start.lng * Math.PI / 180;
            const bearing = windDirection * Math.PI / 180;
            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(distanceKm/R) + 
                                   Math.cos(lat1) * Math.sin(distanceKm/R) * Math.cos(bearing));
            const lon2 = lon1 + Math.atan2(Math.sin(bearing) * Math.sin(distanceKm/R) * Math.cos(lat1), 
                                           Math.cos(distanceKm/R) - Math.sin(lat1) * Math.sin(lat2));
            return { lat: lat2 * 180 / Math.PI, lng: lon2 * 180 / Math.PI };
        }
        
        async function updateForecast(startPoint) {
            if (!startPoint) return;
            const wind = await getWindData(startPoint.lat, startPoint.lng);
            if (!wind) return;
            currentWind = wind;
            updateWindDisplay(wind);
            forecastPoints = [startPoint];
            let currentPoint = startPoint;
            for (let i = 1; i <= 12; i++) {
                const nextPoint = calculateNextPoint(currentPoint, wind, 300);
                forecastPoints.push(L.latLng(nextPoint.lat, nextPoint.lng));
                currentPoint = L.latLng(nextPoint.lat, nextPoint.lng);
            }
            if (forecastLine) map.removeLayer(forecastLine);
            forecastLine = L.polyline(forecastPoints, {
                color: '#00aaff', weight: 3, opacity: 0.7, dashArray: '5, 5'
            }).addTo(map);
        }
        
        function updateHaze(center) {
            const canvas = document.getElementById('haze-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = map.getSize().x;
            canvas.height = map.getSize().y;
            if (!center || !isFlying) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }
            const centerPoint = map.latLngToContainerPoint(center);
            const maxRadius = Math.max(canvas.width, canvas.height) * 1.5;
            const gradient = ctx.createRadialGradient(centerPoint.x, centerPoint.y, 0, centerPoint.x, centerPoint.y, maxRadius);
            const metersPerPixel = map.distance(map.containerPointToLatLng([0, 0]), map.containerPointToLatLng([1, 0]));
            const brightRadius = ZONES.BRIGHT / metersPerPixel;
            const mediumRadius = ZONES.MEDIUM / metersPerPixel;
            const hazeRadius = ZONES.HAZE / metersPerPixel;
            const pos1 = Math.min(1, brightRadius / maxRadius);
            const pos2 = Math.min(1, mediumRadius / maxRadius);
            const pos3 = Math.min(1, hazeRadius / maxRadius);
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(pos1, 'rgba(0,0,0,0)');
            gradient.addColorStop(pos2, 'rgba(100,100,100,0.5)');
            gradient.addColorStop(pos3, 'rgba(50,50,50,0.5)');
            gradient.addColorStop(1, 'rgba(30,30,30,0.5)');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

// Проверка места
      let lastPlaceCheck = null;

async function checkNearbyPlace(lat, lng) {
    const now = Date.now();
    if (lastPlaceCheck && (now - lastPlaceCheck) < 30000) {
        return;
    }
    lastPlaceCheck = now;
    
    try {
        const response = await fetch(`${API_URL}/api/place?lat=${lat}&lon=${lng}`);
        const data = await response.json();
        
        const placeInfo = document.getElementById('placeInfo');
        if (!placeInfo) return;
        
        if (data.found && data.name) {
            placeInfo.style.display = 'block';
            document.getElementById('placeName').innerHTML = `🏙️ ${data.name}${data.country ? `, ${data.country}` : ''}`;
            
            if (data.wikipedia_url) {
                document.getElementById('placeLink').innerHTML = `<a href="${data.wikipedia_url}" target="_blank" style="font-size: 13px; color: #4285f4; text-decoration: none;">📖 Посмотреть в Википедии →</a>`;
            } else {
                document.getElementById('placeLink').innerHTML = '<span style="font-size: 12px; color: #999;">Нет страницы в Википедии</span>';
            }
            
            // Автоматически скрываем через 30 секунд
            setTimeout(() => {
                if (placeInfo.style.display !== 'none') {
                    placeInfo.style.display = 'none';
                }
            }, 30000);
        } else {
            placeInfo.style.display = 'none';
        }
    } catch (error) {
        console.error('Ошибка получения места:', error);
    }
}////////////////////////////////

        
        function moveBalloon() {
            if (!isFlying || !balloonPosition || !currentWind) return;
            const nextPoint = calculateNextPoint(balloonPosition, currentWind, 1);
            balloonPosition = L.latLng(nextPoint.lat, nextPoint.lng);
            if (balloonMarker) balloonMarker.setLatLng(balloonPosition);
            updateCoordDisplay(balloonPosition.lat, balloonPosition.lng);
            updateHaze(balloonPosition);
            checkNearbyPlace(balloonPosition.lat, balloonPosition.lng);
            if (actualPathPoints.length === 0 || map.distance(balloonPosition, actualPathPoints[actualPathPoints.length - 1]) > 10) {
                actualPathPoints.push(balloonPosition);
                if (pathLine) map.removeLayer(pathLine);
                pathLine = L.polyline(actualPathPoints, { color: '#ff4444', weight: 4, opacity: 0.8 }).addTo(map);
            }
            // Проверяем ближайший населённый пункт (не чаще 30 сек)
           if (!lastPlaceCheck || Date.now() - lastPlaceCheck > 30000) {
        checkNearbyPlace(balloonPosition.lat, balloonPosition.lng);
        }
        }
        function updateCoordDisplay(lat, lng) {
            document.getElementById('coordinates').innerHTML = `Широта: ${lat.toFixed(6)}<br>Долгота: ${lng.toFixed(6)}`;
        }
        
        async function startFlight() {
            if (!balloonPosition) { alert('Сначала выберите точку старта'); return; }
            
            const flightStatus = document.getElementById('flightStatus');
            flightStatus.className = 'flight-status status-waiting';
            flightStatus.innerHTML = '⏳ Создание шара...';
            
            try {
                const response = await apiRequest('/api/balloons', {
                    method: 'POST',
                    body: JSON.stringify({ lat: balloonPosition.lat, lng: balloonPosition.lng, userId: getUserId() })
                });
                const balloon = await response.json();
                if (balloon.error) throw new Error(balloon.error);
                
                balloonId = balloon.id;
                currentWind = { speed: balloon.wind_speed, direction: balloon.wind_direction };
                updateWindDisplay(currentWind);
                
                if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
                
                const balloonIcon = L.icon({
                    iconUrl: '/images/balloon.png',
                    iconSize: [32, 32],
                    iconAnchor: [16, 16],
                    popupAnchor: [0, -16]
                });
                
                balloonMarker = L.marker(balloonPosition, { icon: balloonIcon, zIndexOffset: 1000 }).addTo(map);
                actualPathPoints = [balloonPosition];
                
                if (movementInterval) clearInterval(movementInterval);
                movementInterval = setInterval(moveBalloon, 1000);
                
                if (windUpdateInterval) clearInterval(windUpdateInterval);
                windUpdateInterval = setInterval(async () => {
                    if (isFlying && balloonPosition) {
                        const newWind = await getWindData(balloonPosition.lat, balloonPosition.lng);
                        if (newWind) { currentWind = newWind; updateWindDisplay(currentWind); updateForecast(balloonPosition); }
                    }
                }, 60000);
                
                isFlying = true;
                document.getElementById('startBtn').disabled = true;
                flightStatus.className = 'flight-status status-flying';
                flightStatus.innerHTML = '🎈 В ПОЛЁТЕ';
                document.getElementById('hint').style.display = 'none';
                updateHaze(balloonPosition);
            } catch (error) {
                console.error('Ошибка старта:', error);
                alert('Не удалось создать шар: ' + error.message);
                flightStatus.className = 'flight-status status-ready';
                flightStatus.innerHTML = '⏸️ Ожидание старта';
            }
        }
        
        async function restoreBalloon() {
            try {
                const userId = getUserId();
                const response = await fetch(`${API_URL}/api/balloons/${userId}`);
                if (response.status === 404) return false;
                const balloon = await response.json();
                if (balloon && balloon.is_flying) {
                    console.log('🔄 Восстанавливаем шар:', balloon.id);
                    balloonPosition = L.latLng(balloon.current_lat, balloon.current_lng);
                    currentWind = { speed: balloon.wind_speed, direction: balloon.wind_direction };
                    balloonId = balloon.id;
                    
                    if (balloon.path && balloon.path.length > 0) {
                        actualPathPoints = balloon.path.map(p => L.latLng(p.lat, p.lng));
                        if (pathLine) map.removeLayer(pathLine);
                        pathLine = L.polyline(actualPathPoints, { color: '#ff4444', weight: 4, opacity: 0.8 }).addTo(map);
                    }
                    
                    const balloonIcon = L.icon({
                        iconUrl: '/images/balloon.png',
                        iconSize: [32, 32],
                        iconAnchor: [16, 16],
                        popupAnchor: [0, -16]
                    });
                    
                    balloonMarker = L.marker(balloonPosition, { icon: balloonIcon, zIndexOffset: 1000 }).addTo(map);
                    map.setView(balloonPosition, 10);
                    updateCoordDisplay(balloonPosition.lat, balloonPosition.lng);
                    updateWindDisplay(currentWind);
                    
                    isFlying = true;
                    document.getElementById('startBtn').disabled = true;
                    document.getElementById('flightStatus').className = 'flight-status status-flying';
                    document.getElementById('flightStatus').innerHTML = '🎈 В ПОЛЁТЕ';
                    document.getElementById('hint').style.display = 'none';
                    updateHaze(balloonPosition);
                    
                    if (movementInterval) clearInterval(movementInterval);
                    movementInterval = setInterval(moveBalloon, 1000);
                    
                    if (windUpdateInterval) clearInterval(windUpdateInterval);
                    windUpdateInterval = setInterval(async () => {
                        if (isFlying && balloonPosition) {
                            const newWind = await getWindData(balloonPosition.lat, balloonPosition.lng);
                            if (newWind) { currentWind = newWind; updateWindDisplay(currentWind); }
                        }
                    }, 60000);
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Ошибка восстановления:', error);
                return false;
            }
        }
        
        function resetFlight() {
            if (movementInterval) { clearInterval(movementInterval); movementInterval = null; }
            if (windUpdateInterval) { clearInterval(windUpdateInterval); windUpdateInterval = null; }
            if (balloonId) { apiRequest(`/api/balloons/${balloonId}/stop`, { method: 'POST' }).catch(console.error); }
            if (balloonMarker) { map.removeLayer(balloonMarker); balloonMarker = null; }
            if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
            if (forecastLine) { map.removeLayer(forecastLine); forecastLine = null; }
            if (pathLine) { map.removeLayer(pathLine); pathLine = null; }
            forecastPoints = []; actualPathPoints = [];
            isFlying = false; balloonPosition = null; currentWind = null; balloonId = null;
            document.getElementById('coordinates').innerHTML = 'Широта: --<br>Долгота: --';
            updateWindDisplay(null);
            document.getElementById('startBtn').disabled = true;
            document.getElementById('flightStatus').className = 'flight-status status-ready';
            document.getElementById('flightStatus').innerHTML = '⏸️ Ожидание старта';
            document.getElementById('hint').style.display = 'block';
            document.getElementById('hint').innerHTML = '👆 Кликните на карту, чтобы выбрать место старта';
            updateHaze(null);
        }


        
        // ========== КАРТА ==========
        const map = L.map('map', { center: [52.12, 23.72], zoom: 8, zoomControl: true });
        const esriSatellite = L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Tiles © Esri', maxZoom: 19 });
        const osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 });
        esriSatellite.addTo(map);
        L.control.layers({ "🛰️ Спутник ESRI": esriSatellite, "🗺️ Схема OSM": osmStandard }, null, { position: 'topleft', collapsed: false }).addTo(map);
        L.control.scale({ metric: true, position: 'bottomleft' }).addTo(map);
        
        // ========== СОБЫТИЯ ==========
        map.on('click', async function(e) {
            if (isFlying) return;
            const { lat, lng } = e.latlng;
            if (startMarker) map.removeLayer(startMarker);
            startMarker = L.marker([lat, lng]).addTo(map);
            balloonPosition = L.latLng(lat, lng);
            updateCoordDisplay(lat, lng);
            document.getElementById('flightStatus').className = 'flight-status status-waiting';
            document.getElementById('flightStatus').innerHTML = '⏳ Получение прогноза ветра...';
            await updateForecast(balloonPosition);
            document.getElementById('flightStatus').className = 'flight-status status-ready';
            document.getElementById('flightStatus').innerHTML = '⏸️ Ожидание старта';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('hint').innerHTML = '✅ Точка выбрана. Нажмите СТАРТ';
        });
        
        document.getElementById('startBtn').addEventListener('click', startFlight);
        document.getElementById('resetBtn').addEventListener('click', resetFlight);
        
        // Авторизация
        document.getElementById('profileButton').addEventListener('click', () => showAuthModal(true));
        document.getElementById('continueGuestBtn').addEventListener('click', continueAsGuest);
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                document.getElementById('loginForm').classList.toggle('hidden', tabName !== 'login');
                document.getElementById('registerForm').classList.toggle('hidden', tabName !== 'register');
            });
        });
        document.getElementById('loginBtn').addEventListener('click', () => {
            login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        });
        document.getElementById('registerBtn').addEventListener('click', () => {
            register(document.getElementById('regEmail').value, document.getElementById('regPassword').value);
        });
        
        // Инициализация
        if (token) {
            fetch(`${API_URL}/api/auth/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => res.json()).then(user => {
                if (user && !user.error) {
                    currentUser = user;
                    isGuest = false;
                    updateProfileUI();
                    restoreBalloon();
                } else {
                    logout();
                }
            }).catch(() => logout());
        } else {
            updateProfileUI();
        }
        
        map.on('move', () => { if (balloonPosition && isFlying) updateHaze(balloonPosition); });
        window.addEventListener('resize', () => { if (balloonPosition && isFlying) updateHaze(balloonPosition); });
        
        console.log('🎈 Симулятор готов! Режим:', currentUser ? 'Авторизован' : 'Гость');

        console.log('🎈 Симулятор готов! API_URL =', API_URL);

// ========== ПИНГ ДЛЯ ПОДДЕРЖАНИЯ СЕРВЕРА ==========
// Каждые 10 минут отправляем запрос к серверу, чтобы он не засыпал
setInterval(() => {
    fetch(`${API_URL}/api/health`)
        .then(response => response.json())
        .then(data => console.log('💓 Пинг сервера:', data.status))
        .catch(err => console.warn('⚠️ Пинг не удался:', err));
}, 600000); // 600000 мс = 10 минут

console.log('🕐 Пинг настроен (каждые 10 минут)');
    </script>
</body>
</html>
