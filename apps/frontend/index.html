<!DOCTYPE html>
<html>
<head>
    <title>Воздушный шар - Симулятор полета</title>
    <meta charset="utf-8" />
    
    <!-- Подключаем Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <div id="map"></div>
    
   <!-- Рекламный баннер внизу -->
<div id="ad-container" style="
    position: fixed;
    bottom: 20px; /* Поднимаем чуть выше края, чтобы не сливался */
    left: 50%;
    transform: translateX(-50%); /* Центрируем по горизонтали */
    width: auto;
    max-width: 90%; /* Ограничиваем ширину, чтобы не закрывал углы */
    background: rgba(255,255,255,0.95);
    border: 1px solid #4285f4;
    border-radius: 12px; /* Закругляем, чтобы выглядел как отдельный блок */
    padding: 8px 15px;
    text-align: center;
    z-index: 1500;
    font-family: Arial, sans-serif;
    font-size: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
">
    <div style="display: flex; justify-content: center; align-items: center; gap: 15px;">
        <span style="color: #666; white-space: nowrap;">Реклама</span>
        <div id="ad-content" style="max-width: 728px;">
            <div style="background: #f0f0f0; border-radius: 8px; padding: 10px; border: 1px dashed #ccc;">
                📢 <strong>Ваша реклама здесь</strong><br>
                <span style="font-size: 11px; color: #999;">Свяжитесь с нами: admin@balloon-service.com</span>
            </div>
        </div>
        <button id="close-ad" style="background: none; border: none; font-size: 18px; cursor: pointer; color: #999; padding: 0 5px;">✕</button>
    </div>
</div>

    
    <canvas id="haze-canvas"></canvas>
    
    <!-- Кнопка профиля -->
    <div id="profileButton" class="profile-btn">
        <span>👤</span> <span id="profileStatus">Гость</span>
    </div>
    
    <!-- Модальное окно авторизации -->
    <div id="authModal" class="auth-modal hidden">
        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Вход</div>
                <div class="auth-tab" data-tab="register">Регистрация</div>
            </div>
            
            <div id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
                <div id="loginError" class="auth-error"></div>
            </div>
            
            <div id="registerForm" class="auth-form hidden">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)">
                <button id="registerBtn">Зарегистрироваться</button>
                <div id="regError" class="auth-error"></div>
            </div>
            <div style="text-align: center; margin-top: 15px; font-size: 12px; color: #999;">
                <button id="continueGuestBtn" style="background: none; border: none; color: #4285f4; cursor: pointer;">Продолжить как гость</button>
            </div>
        </div>
    </div>
    
    <div class="left-controls">
        <button class="custom-button" id="startBtn" disabled>▶ СТАРТ</button>
        <button class="custom-button" id="resetBtn">🗑️ Сбросить</button>
    </div>
    
    <div class="info-panel">
        <h3 style="margin: 0 0 10px 0;">🎈 Воздушный шар</h3>
        <div class="coord-display" id="coordinates">Широта: --<br>Долгота: --</div>
        <div class="wind-info" id="windInfo">
            <div>🌬️ Ветер: --</div>
            <div>🧭 Направление: --</div>
            <div>📏 Скорость: -- м/с</div>
        </div>
        <div class="flight-status status-ready" id="flightStatus">⏸️ Ожидание старта</div>
        <div id="placeInfo" style="margin-top: 15px; padding: 10px; background: #f9f9f9; border-radius: 8px; display: none; border-left: 3px solid #ff9800;">
            <div id="placeName" style="font-weight: bold; color: #333; margin-bottom: 8px;"></div>
            <div id="placeLink" style="margin-top: 5px;"></div>
        </div>
    </div>

    <div class="hint" id="hint">👆 Кликните на карту, чтобы выбрать место старта</div>
    <div class="loading" id="loading">Загрузка карты... 🗺️</div>
    
    <!-- Подключаем скрипты -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/balloon.js"></script>
    <script src="js/main.js"></script>
    
    <!-- Дополнительная инициализация -->
    <script>
        // Закрытие рекламного баннера с сохранением в localStorage
        const closeAdBtn = document.getElementById('close-ad');
        if (closeAdBtn) {
            closeAdBtn.addEventListener('click', () => {
                document.getElementById('ad-container').style.display = 'none';
                localStorage.setItem('ad_closed', 'true');
            });
            
            // Если баннер уже закрывали, не показываем
           // if (localStorage.getItem('ad_closed') === 'true') {
          //      document.getElementById('ad-container').style.display = 'none';
          //  }
        }
        
        // Логирование состояния (ждём загрузки всех модулей)
        setTimeout(() => {    }, 100);
    </script>
</body>
</html>
